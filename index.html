<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="个人开发导航面板，聚合GitHub、浏览器、Linux系统、编程开发工具下载与Linux常用命令速查">
    <title>个人开发导航面板</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>💻</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        :root {
            --bg: #f6f8fa;
            --text: #1f2937;
            --card-bg: #ffffff;
            --border: #e5e7eb;
            --primary: #2563eb;
            --primary-light: rgba(37, 99, 235, 0.15);
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        [data-theme="dark"] {
            --bg: #0f172a;
            --text: #f1f5f9;
            --card-bg: #1e293b;
            --border: #475569;
            --shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background: var(--bg);
            color: var(--text);
            padding: 4rem 5%;
            max-width: 1300px;
            margin: 0 auto;
            transition: background 0.3s ease, color 0.3s ease;
        }
        /* 顶部标题栏 */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 30px;
            font-weight: 600;
        }
        h3 {
            width: 100%;
            margin: 16px 0 8px;
            font-size: 17px;
            opacity: 0.85;
        }
        /* 浏览器提示 */
        .browser-tip {
            text-align: center;
            font-size: 16px;
            margin-bottom: 2.5rem;
            padding: 10px 14px;
            background: var(--primary-light);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }
        .browser-tip.close {
            display: none;
        }
        .browser-tip a {
            color: var(--primary);
            font-weight: 500;
        }
        .close-tip {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 18px;
            opacity: 0.7;
        }
        /* 主题切换 */
        .theme-switch {
            display: flex;
            gap: 8px;
        }
        .theme-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .theme-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        /* 导航分类 */
        .category-block {
            margin-bottom: 36px;
        }
        .category-title {
            font-size: 19px;
            border-left: 5px solid var(--primary);
            padding-left: 12px;
            margin-bottom: 14px;
            font-weight: 500;
        }
        .link-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .nav-card {
            padding: 10px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            text-decoration: none;
            color: var(--text);
            font-size: 15px;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
        }
        .nav-card:hover {
            background-color: var(--primary);
            color: #fff;
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }
        /* Linux命令板块 */
        .cmd-search {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text);
            margin-bottom: 14px;
            font-size: 15px;
            outline: none;
        }
        .cmd-search:focus {
            border-color: var(--primary);
        }
        .cmd-box {
            margin-top: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }
        .cmd-text {
            font-family: monospace;
            word-break: break-all;
            padding-right: 10px;
        }
        .copy-btn {
            padding: 4px 10px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }
        /* 回到顶部 */
        .back-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }
        .back-top.show {
            opacity: 1;
            pointer-events: auto;
        }
        /* 移动端适配 */
        @media (max-width: 600px) {
            body {
                padding: 2rem 4%;
            }
            h1 {
                font-size: 24px;
            }
            .header-bar {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
            .back-top {
                bottom: 16px;
                right: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <h1>个人开发导航面板</h1>
        <div class="theme-switch">
            <button class="theme-btn" data-mode="light">浅色</button>
            <button class="theme-btn" data-mode="dark">深色</button>
        </div>
    </div>

    <!-- 顶部浏览器下载提示 -->
    <div class="browser-tip" id="browserTip">
        没有浏览器? <a href="https://v4.gh-proxy.org/https://github.com/ungoogled-software/ungoogled-chromium-windows/releases/download/149.0.7827.155-1.1/ungoogled-chromium_149.0.7827.155-1.1_installer_x64.exe" target="_blank">点击这里下载一个!</a>
        <button class="close-tip" id="closeTip">×</button>
    </div>

    <!-- GitHub 快捷入口 -->
    <div class="category-block">
        <div class="category-title">GitHub 快捷访问</div>
        <div class="link-group" id="githubGroup"></div>
    </div>

    <!-- 开发工具下载 -->
    <div class="category-block">
        <div class="category-title">开发工具下载</div>
        <div class="link-group" id="toolGroup"></div>
    </div>

    <!-- Linux 常用命令速查（支持一键复制+搜索） -->
    <div class="category-block">
        <div class="category-title">Linux 常用命令速查</div>
        <input class="cmd-search" placeholder="输入关键词过滤命令..." id="cmdSearch">
        <div class="cmd-list" id="cmdList"></div>
    </div>

    <!-- 回到顶部按钮 -->
    <button class="back-top" id="backTop">↑</button>

    <script>
        // ========== 配置区：新增链接/命令只改这里，不用动DOM ==========
        const config = {
            githubLinks: [
                {name: "GitHub 主页", url: "https://github.com"},
                {name: "本项目发布页", url: "https://github.com/sakura01266/sakura01266.github.io"}
            ],
            tools: [
                {type: "浏览器", list: [
                    {name: "Hibbiki Chromium", url: "https://github.com/Hibbiki/chromium-win64/releases"},
                    {name: "ungoogled-chromium", url: "https://github.com/ungoogled-software/ungoogled-chromium-windows/releases"},
                    {name: "woolyss-chromium下载站（即将停服）", url: "https://chromium.woolyss.com"},
                    {name: "谷歌原版Chrome（可能连不上）", url: "https://www.google.com/chrome/"},
                    {name: "Firefox", url: "https://www.firefox.com/zh-CN/download/all/"},
                    {name: "Librewolf", url: "https://librewolf.net/installation/"},
                    {name: "Brave", url: "https://www.brave.com/zh/"}
                ]},
                {type: "操作系统", list: [
                    {name: "Ubuntu", url: "https://ubuntu.com/download/desktop"},
                    {name: "Fedora", url: "https://fedoraproject.org/workstation/download"},
                    {name: "Arch Linux", url: "https://mirrors.ustc.edu.cn/archlinux/iso"},
                    {name: "Kali Linux", url: "https://www.kali.org/get-kali/"},
                    {name: "Debian", url: "https://www.debian.org/distrib/"},
                    {name: "Linux Mint", url: "https://mirrors.ustc.edu.cn/linuxmint-cd/stable"},
                    {name: "Manjaro", url: "https://manjaro.org/products/download/x86"},
                    {name: "LMDE", url: "https://mirrors.ustc.edu.cn/linuxmint-cd/debian"},
                    {name: "Trisquel", url: "https://trisquel.info/en/download"}
                ]},
                {type: "开发工具", list: [
                    {name: "Android Studio", url: "https://developer.android.google.cn/studio"},
                    {name: "Visual Studio Code", url: "https://code.visualstudio.com/Download"},
                    {name: "Visual Studio", url: "https://visualstudio.microsoft.com/zh-hans/downloads/"},
                    {name: "vscodium", url: "https://github.com/VSCodium/vscodium/releases"},
                    {name: "Node.js", url: "https://nodejs.org/zh-cn/download/"},
                    {name: "Python", url: "https://www.python.org/downloads/"},
                    {name: "Pycharm", url: "https://www.jetbrains.com.cn/pycharm/download"},
                    {name: "Android Studio Preview", url: "https://developer.android.google.cn/studio/preview"},
                    {name: "ADB", url: "https://developer.android.google.cn/tools/releases/platform-tools"},
                    {name: "lua", url: "https://www.lua.org/download.html"}
                ]}
            ],
            cmds: [
                "apt update && apt upgrade -y",
                "dnf update -y",
                "lsblk / fdisk -l 查看磁盘分区",
                "smartctl --scan 硬盘健康检测",
                "systemctl start / stop / enable 服务名",
                "nmap 192.168.1.0/24 内网扫描",
                "chmod 755 / chown 用户:组 文件",
                "git add . && git commit -m \"msg\" && git push",
                "docker ps / docker run / docker rm"
            ]
        };

        // ========== 本地存储工具 ==========
        function saveStorage(key, val) {
            localStorage.setItem(key, val);
        }
        function getStorage(key) {
            return localStorage.getItem(key);
        }

        // ========== 页面渲染函数 ==========
        function renderGitHub() {
            const wrap = document.getElementById("githubGroup");
            wrap.innerHTML = config.githubLinks.map(item => `
                <a class="nav-card" href="${item.url}" target="_blank">${item.name}</a>
            `).join("");
        }
        function renderTools() {
            const wrap = document.getElementById("toolGroup");
            let html = "";
            config.tools.forEach(group => {
                html += `<h3>${group.type}</h3>`;
                group.list.forEach(item => {
                    html += `<a class="nav-card" href="${item.url}" target="_blank">${item.name}</a>`;
                })
            })
            wrap.innerHTML = html;
        }
        function renderCmdList(filter = "") {
            const wrap = document.getElementById("cmdList");
            const filterText = filter.toLowerCase();
            let html = "";
            config.cmds.forEach(cmd => {
                if (!cmd.toLowerCase().includes(filterText)) return;
                html += `
                    <div class="cmd-box" data-cmd="${cmd}">
                        <span class="cmd-text">${cmd}</span>
                        <button class="copy-btn" onclick="copyText(this)">复制</button>
                    </div>
                `;
            })
            wrap.innerHTML = html;
        }

        // ========== 复制命令（增加异常捕获） ==========
        window.copyText = async function(btn) {
            try {
                const text = btn.parentElement.querySelector(".cmd-text").innerText;
                await navigator.clipboard.writeText(text);
                btn.innerText = "已复制!";
            } catch (err) {
                btn.innerText = "复制失败";
            }
            setTimeout(() => btn.innerText = "复制", 1200);
        }

        // ========== 主题切换 ==========
        let currentTheme = "light";
        function setThemeActive(mode) {
            document.querySelectorAll(".theme-btn").forEach(btn => {
                btn.classList.remove("active");
                if (btn.dataset.mode === mode) btn.classList.add("active");
            })
        }
        function initTheme() {
            const saveTheme = getStorage("site_theme");
            if (saveTheme) {
                currentTheme = saveTheme;
                document.documentElement.setAttribute("data-theme", currentTheme);
                setThemeActive(currentTheme);
            }
            document.querySelectorAll(".theme-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    currentTheme = btn.dataset.mode;
                    document.documentElement.setAttribute("data-theme", currentTheme);
                    setThemeActive(currentTheme);
                    saveStorage("site_theme", currentTheme);
                })
            })
        }

        // ========== 顶部提示关闭 ==========
        function initTipClose() {
            const tip = document.getElementById("browserTip");
            const closeBtn = document.getElementById("closeTip");
            const isClosed = getStorage("tip_closed");
            if (isClosed === "1") tip.classList.add("close");
            closeBtn.addEventListener("click", () => {
                tip.classList.add("close");
                saveStorage("tip_closed", "1");
            })
        }

        // ========== 命令搜索过滤 ==========
        function initCmdSearch() {
            const input = document.getElementById("cmdSearch");
            input.addEventListener("input", e => {
                renderCmdList(e.target.value);
            })
        }

        // ========== 回到顶部按钮 ==========
        function initBackTop() {
            const btn = document.getElementById("backTop");
            window.addEventListener("scroll", () => {
                if (window.scrollY > 300) btn.classList.add("show");
                else btn.classList.remove("show");
            })
            btn.addEventListener("click", () => window.scrollTo(0, 0));
        }

        // ========== 页面加载入口 ==========
        window.addEventListener("DOMContentLoaded", () => {
            renderGitHub();
            renderTools();
            renderCmdList();
            initTheme();
            initTipClose();
            initCmdSearch();
            initBackTop();
        });
    </script>
</body>
</html>
